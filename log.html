                <div class="card">

    <h1>Hall Access</h1>

    <!-- BOTÕES DE TROCA -->
    <div class="toggle">
        <button onclick="mostrarCadastro()">Cadastro</button>
        <button onclick="mostrarLogin()">Login</button>
    </div>

    <!-- FORMULÁRIOS -->
    <div class="form-area">

        <div class="form-box" id="formCadastro">
            <h2>Cadastro</h2>
            <input type="text" id="ipt_nome" placeholder="Nome">
            <input type="password" id="ipt_senha" placeholder="Senha">
            <button onclick="cadastrar()">Cadastrar</button>
        </div>

        <div class="form-box hidden" id="formLogin">
            <h2>Login</h2>
            <input type="text" id="ipt_login_nome" placeholder="Nome">
            <input type="password" id="ipt_login_senha" placeholder="Senha">
            <button onclick="login()">Entrar</button>
        </div>

    </div>

    <div id="resultado"></div>

</div>
